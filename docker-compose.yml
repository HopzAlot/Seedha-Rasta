version: "3.9"

services:
  db:
    image: postgres:15
    container_name: seedha-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:latest
    container_name: seedha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  backend:
    build: ./backend
    container_name: seedha-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./backend/.env
    depends_on:
      - db
      - redis
    entrypoint: ["sh", "/app/entrypoint.sh"]

  frontend:
    build: ./seedha
    container_name: seedha-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./seedha:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: